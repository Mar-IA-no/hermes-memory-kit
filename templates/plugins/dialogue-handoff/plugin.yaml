name: dialogue-handoff
version: 3.1.0
description: "Conversational continuity for Hermes. post_llm_call persists a Recent Exchanges tail (verbatim multi-line) in DIALOGUE-HANDOFF.md; pre_llm_call reads that tail directly (no need to reopen session JSON). Gated by substantive-turn threshold so trivial echoes do not overwrite the real conversation tail. v3.1 fixes _trunc() which previously stripped multi-line content to first line only. Requires HMK_AGENT_MEMORY_BASE + HMK_HERMES_HOME (or direct HMK_DIALOGUE_HANDOFF_PATH / HMK_ALWAYS_CONTEXT_PATH / HMK_SESSIONS_DIR) in the agent .env; otherwise the plugin disables itself."
author: "hermes-memory-kit"
provides_hooks:
  - post_llm_call
  - pre_llm_call
